user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # API 限流区域定义（必须位于 http 级别）
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # 上游服务器
    upstream backend {
        server server:3000;
        keepalive 32;
    }

    # HTTP 重定向到 HTTPS
    server {
        listen 80;
        server_name yibin-youth.com www.yibin-youth.com api.yibin-youth.com;
        return 301 https://$server_name$request_uri;
    }

    # 主站 HTTPS
    server {
        listen 443 ssl http2;
        server_name yibin-youth.com www.yibin-youth.com;

        ssl_certificate /etc/nginx/ssl/yibin-youth.com.crt;
        ssl_certificate_key /etc/nginx/ssl/yibin-youth.com.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # 安全头
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # 管理后台
        location /admin {
            alias /usr/share/nginx/html/admin;
            try_files $uri $uri/ /admin/index.html;
        }

        # 用户端 H5
        location = / {
            return 302 /client/;
        }

        location /client {
            alias /usr/share/nginx/html/client;
            try_files $uri $uri/ /client/index.html;
        }

        # 商家核销H5
        location /merchant {
            alias /usr/share/nginx/html/merchant;
            try_files $uri $uri/ /merchant/index.html;
        }

        # 静态资源
        location /static {
            root /usr/share/nginx/html;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # 健康检查
        location /health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }
    }

    # API 服务 HTTPS
    server {
        listen 443 ssl http2;
        server_name api.yibin-youth.com;

        ssl_certificate /etc/nginx/ssl/api.yibin-youth.com.crt;
        ssl_certificate_key /etc/nginx/ssl/api.yibin-youth.com.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # 安全头
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # API 代理
        location / {
            # 限流（放在 location 块内）
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # 超时设置
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # 缓冲设置
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 16k;
            proxy_busy_buffers_size 24k;
        }

        # 健康检查不限流
        location /health {
            proxy_pass http://backend;
        }

        location /ready {
            proxy_pass http://backend;
        }
    }
}
